name: MS6 - Validateur de donnees capteur

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'ms_validateur_capteur/'
      - '.github/workflows/ci_validateur.yml'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'ms_validateur_capteur/**'
      - '.github/workflows/ci_validateur.yml'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ms_validateur_capteur

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install "poetry==2.3.2"

      - name: Sync lock file with pyproject
        run: poetry lock

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        env:
          PYTHONPATH: .
        run: poetry run pytest -q

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: ms_validateur_capteur

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install "poetry==2.3.2"

      - name: Sync lock file with pyproject
        run: poetry lock

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run flake8
        run: poetry run flake8 . --max-line-length=120 --extend-ignore=W292,W391

      - name: Run tests with coverage XML
        env:
          PYTHONPATH: .
        run: |
          mkdir -p reports
          poetry run pytest -q \
            --cov=. \
            --cov-report=xml:reports/coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ms_validateur_capteur
          args: >
            -Dsonar.projectKey=AmbiNtsoah_EC03_Redline_UrbanHub
            -Dsonar.organization=ambintsoah
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.version=3.11
            -Dsonar.python.coverage.reportPaths=reports/coverage.xml
            -Dsonar.sourceEncoding=UTF-8

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t validateur-capteur:latest ./ms_validateur_capteur

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/validateur-capteur:latest
            docker stop validateur-capteur || true
            docker rm validateur-capteur || true
            docker run -d -p 8000:8000 --name validateur-capteur \
              ${{ secrets.DOCKER_USERNAME }}/validateur-capteur:latest