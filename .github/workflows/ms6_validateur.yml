name: MS6 - Validateur de donnees capteur

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ms_validateur_capteur/**
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Tests Python
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ms_validateur_capteur

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run tests
        run: poetry run pytest --maxfail=1 --disable-warnings -q

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: ms_validateur_capteur

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install tools
        run: |
          poetry add --group dev flake8
          npm install -g snyk

      - name: Flake8 (lint)
        run: poetry run flake8 .

      - name: Snyk scan
        run: snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t validateur-capteur:latest ./ms_validateur_capteur

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/validateur-capteur:latest
            docker stop validateur-capteur || true
            docker rm validateur-capteur || true
            docker run -d -p 8000:8000 --name validateur-capteur \
              ${{ secrets.DOCKER_USERNAME }}/validateur-capteur:latest